  --bg: #0c0614;

* { margin: 0; padding: 0; box-sizing: border-box; }

  inset: 0;
  background:

  font-size: 28px; font-weight: 700; color: var(--bg);

  border-radius: var(--radius);
  margin-bottom: 6px;
  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.3s;
  min-height: 60px;
  box-shadow: 0 10px 30px -10px rgba(200, 55, 46, 0.5);
  position: relative;
}
.primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 18px 42px -12px rgba(200, 55, 46, 0.7);
}
.primary .play-icon {
  display: inline-block;
  margin-right: 8px;
  font-size: 20px;
  vertical-align: middle;
}
.primary-note {
  text-align: center;
  font-size: 12px;
  color: var(--text-muted);
  margin-bottom: 28px;
  line-height: 1.5;
}

.section-label {

  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--gold);

  margin-bottom: 12px;
  padding-left: 4px;

.links { display: flex; flex-direction: column; gap: 10px; margin-bottom: 28px; }

.link {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 14px 18px;
  background: var(--card);
  border: 1px solid var(--card-border);
  border-radius: var(--radius);
  color: var(--cream);
  font-size: 14.5px;
  font-weight: 600;
  text-decoration: none;
  cursor: pointer;
  transition: border-color 0.3s, transform 0.2s;
  position: relative;
}
.link:hover {
  border-color: rgba(212, 165, 116, 0.35);
  transform: translateY(-1px);
}
.link .icon {
  width: 22px; height: 22px;
  color: var(--gold);
  flex-shrink: 0;

.link .body { flex: 1; min-width: 0; }
.link .sub {

.link .badge {

  margin-left: 8px;

.link.soon { opacity: 0.88; }

/* SOCIAL ROW */
.socials {

  gap: 16px;

.social-link {
  width: 40px; height: 40px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 50%;
  background: var(--card);
  border: 1px solid var(--card-border);
  color: var(--text-dim);
  text-decoration: none;
  transition: border-color 0.3s, color 0.3s;
}
.social-link:hover {
  border-color: var(--gold);
  color: var(--gold);
}
.social-link svg { width: 18px; height: 18px; }

/* FOOTER */
.foot {

  font-size: 11px;
  color: var(--text-muted);
  opacity: 0.6;
}
.foot span { color: var(--gold); font-weight: 600; }

a:focus-visible { outline: 2px solid var(--gold); outline-offset: 2px; }
</style>
