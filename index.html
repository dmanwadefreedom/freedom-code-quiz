<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Free Quiz — Why Do You Stay Stuck?</title>
<meta name="description" content="3-minute quiz. There are 4 reasons people stay stuck. Find out which one is yours — and what to do about it.">
<style>body{background:#1a1714;}</style>
<script>
// A/B Split — 50/50 random redirect, sticky per visitor
(function(){
  var v = localStorage.getItem('quiz_version');
  if (!v) {
    v = Math.random() < 0.5 ? 'a' : 'b';
    localStorage.setItem('quiz_version', v);
  }
  window.location.replace('/' + v + '/');
})();
</script>
</head>
<body></body>
</html>
