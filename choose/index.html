<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Choose Your Path | Dylan Ewing</title>
<meta name="description" content="Two hands. Two paths. Material or Energy. Pick the crystal.">
<meta property="og:title" content="Choose Your Path. Dylan Ewing">
<meta property="og:description" content="Two hands offered. One you.">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;500;700&family=Cormorant+Garamond:ital,wght@0,300;0,500;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #a83328;
    --red-warm: #d9533f;
    --blue: #2d4a7a;
    --blue-warm: #4b7ec2;
    --candle: #ffb96a;
    --candle-core: #ffd9a0;
    --ink: #1a1512;
    --paper: #f2e6cc;
    --paper-dim: #c9bfa6;
    --bg: #08060a;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:100%; height:100%; }
  body {
    background: radial-gradient(ellipse at 50% 55%, #1a120a 0%, #0c0806 45%, #030203 100%);
    color: var(--paper);
    font-family: 'Cormorant Garamond', 'Noto Serif JP', serif;
    min-height: 100vh;
    overflow: hidden;
    position: relative;
  }

  /* Paper/grain noise */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.7' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.12'/%3E%3C/svg%3E");
    pointer-events: none;
    mix-blend-mode: overlay;
    opacity: 0.35;
    z-index: 6;
  }

  /* Stacked canvas layers */
  #flame   { position: fixed; inset: 0; z-index: 2; pointer-events: none; }
  #embers  { position: fixed; inset: 0; z-index: 3; pointer-events: none; }

  /* Candlelight halo (larger, lower) */
  .halo {
    position: fixed;
    top: 55%; left: 50%;
    width: 1500px; height: 900px;
    transform: translate(-50%, -50%);
    background: radial-gradient(ellipse,
      rgba(255, 185, 106, 0.28) 0%,
      rgba(255, 185, 106, 0.12) 20%,
      rgba(168, 51, 40, 0.05) 38%,
      transparent 60%);
    animation: flicker 4.5s ease-in-out infinite alternate;
    pointer-events: none;
    z-index: 1;
    filter: blur(12px);
  }
  @keyframes flicker {
    0%, 100% { opacity: 0.88; transform: translate(-50%, -50%) scale(1); }
    25%      { opacity: 1.0;  transform: translate(-50%, -50.3%) scale(1.02); }
    50%      { opacity: 0.8;  transform: translate(-50%, -49.7%) scale(0.98); }
    75%      { opacity: 0.95; transform: translate(-50.2%, -50%) scale(1.01); }
  }

  /* ===== TITLE ===== */
  .title {
    position: fixed;
    top: 7%;
    left: 0; right: 0;
    text-align: center;
    z-index: 8;
    pointer-events: none;
  }
  .title .jp {
    font-family: 'Noto Serif JP', serif;
    font-weight: 300;
    font-size: 22px;
    letter-spacing: 8px;
    color: var(--paper-dim);
    opacity: 0.8;
    margin-bottom: 8px;
    text-shadow: 0 2px 20px rgba(0,0,0,0.9);
  }
  .title h1 {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 300;
    font-size: clamp(38px, 6.5vw, 58px);
    color: var(--paper);
    letter-spacing: 2px;
    line-height: 1.1;
    text-shadow: 0 2px 20px rgba(0,0,0,0.95), 0 0 35px rgba(0,0,0,0.7);
  }
  .title h1 em {
    font-style: italic;
    color: var(--candle);
    font-weight: 500;
  }
  .title .kicker {
    font-size: 11px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--paper-dim);
    opacity: 0.5;
    margin-bottom: 10px;
  }

  /* ===== STAGE — Single image, two hotspots ===== */
  .stage {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -52%);
    width: min(96vw, 1100px);
    height: min(62vh, 540px);
    z-index: 4;
  }

  .hands-frame {
    position: relative;
    width: 100%; height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .hands-media {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: contain;
    -webkit-mask-image: radial-gradient(ellipse 80% 78% at 50% 52%,
                          #000 35%, rgba(0,0,0,0.85) 58%, rgba(0,0,0,0.35) 80%, transparent 98%);
            mask-image: radial-gradient(ellipse 80% 78% at 50% 52%,
                          #000 35%, rgba(0,0,0,0.85) 58%, rgba(0,0,0,0.35) 80%, transparent 98%);
    mix-blend-mode: screen;
    filter: drop-shadow(0 0 60px rgba(255, 185, 106, 0.2));
    pointer-events: none;
    animation: breathe 6.5s ease-in-out infinite;
    transition: opacity 0.9s cubic-bezier(0.25, 0.8, 0.25, 1);
  }
  /* Default state: closed visible, others hidden */
  .state-closed { opacity: 1; z-index: 3; }
  .state-left   { opacity: 0; z-index: 2; }
  .state-right  { opacity: 0; z-index: 2; }

  /* When hovering left hotspot */
  .stage.hover-left  .state-closed { opacity: 0; }
  .stage.hover-left  .state-left   { opacity: 1; z-index: 4; animation: crystalPulseRed 2.8s ease-in-out infinite; }

  /* When hovering right hotspot */
  .stage.hover-right .state-closed { opacity: 0; }
  .stage.hover-right .state-right  { opacity: 1; z-index: 4; animation: crystalPulseBlue 2.8s ease-in-out infinite; }

  @keyframes crystalPulseRed {
    0%, 100% { filter: drop-shadow(0 0 60px rgba(255, 185, 106, 0.2)) brightness(1)    saturate(1); }
    50%      { filter: drop-shadow(0 0 90px rgba(217, 83, 63, 0.35))  brightness(1.12) saturate(1.2); }
  }
  @keyframes crystalPulseBlue {
    0%, 100% { filter: drop-shadow(0 0 60px rgba(255, 185, 106, 0.2)) brightness(1)    saturate(1); }
    50%      { filter: drop-shadow(0 0 90px rgba(75, 126, 194, 0.35)) brightness(1.12) saturate(1.2); }
  }
  @keyframes breathe {
    0%, 100% { transform: scale(1) translateY(0); }
    50%      { transform: scale(1.015) translateY(-3px); }
  }

  /* Invisible clickable hotspots */
  .hot {
    position: absolute;
    top: 0;
    height: 100%;
    width: 50%;
    cursor: pointer;
    z-index: 2;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    padding-bottom: 6%;
    transition: transform 0.6s cubic-bezier(0.3, 0.7, 0.2, 1);
    text-decoration: none;
  }
  .hot.left  { left: 0; }
  .hot.right { right: 0; }
  .hot:hover { transform: translateY(-4px); }

  .hot::before {
    content: '';
    position: absolute;
    inset: 10% 8%;
    border-radius: 50%;
    background: radial-gradient(circle at 50% 55%,
                  rgba(255,255,255,0.04) 0%,
                  transparent 60%);
    opacity: 0;
    transition: opacity 0.6s ease;
    pointer-events: none;
  }
  .hot:hover::before { opacity: 1; }
  .hot.left:hover::before  { background: radial-gradient(circle at 50% 55%, rgba(217,83,63,0.18), transparent 60%); }
  .hot.right:hover::before { background: radial-gradient(circle at 50% 55%, rgba(75,126,194,0.18), transparent 60%); }

  /* Labels inside hotspots */
  .label {
    position: relative;
    z-index: 3;
    font-family: 'Cormorant Garamond', serif;
    text-align: center;
    opacity: 0.75;
    transition: opacity 0.5s ease, transform 0.5s ease;
    pointer-events: none;
  }
  .hot:hover .label { opacity: 1; transform: translateY(-4px); }
  .label .kanji {
    font-family: 'Noto Serif JP', serif;
    font-size: 13px;
    letter-spacing: 6px;
    color: var(--paper-dim);
    opacity: 0.6;
    margin-bottom: 4px;
    text-shadow: 0 2px 10px rgba(0,0,0,0.9);
  }
  .label .name {
    font-size: clamp(22px, 3.5vw, 30px);
    font-style: italic;
    letter-spacing: 1px;
    margin-bottom: 3px;
    text-shadow: 0 2px 14px rgba(0,0,0,0.95);
  }
  .label .sub {
    font-size: 12.5px;
    color: var(--paper-dim);
    opacity: 0.7;
    max-width: 220px;
    line-height: 1.4;
    text-shadow: 0 2px 10px rgba(0,0,0,0.9);
  }
  .hot.left .name  { color: var(--red-warm); }
  .hot.right .name { color: var(--blue-warm); }

  /* Tunnel-zoom click */
  .stage.tunnel-red, .stage.tunnel-blue {
    animation: tunnelZoom 0.9s cubic-bezier(0.6, 0, 0.9, 0.3) forwards;
  }
  @keyframes tunnelZoom {
    to { transform: translate(-50%, -52%) scale(5); opacity: 0; filter: blur(8px); }
  }
  .tunnel-vignette {
    position: fixed; inset: 0; z-index: 100;
    pointer-events: none; opacity: 0;
    transition: opacity 0.9s ease;
  }
  .tunnel-vignette.active { opacity: 1; }
  .tunnel-vignette.red  { background: radial-gradient(circle at 30% 50%, transparent 0%, #3a0806 55%, #000 100%); }
  .tunnel-vignette.blue { background: radial-gradient(circle at 70% 50%, transparent 0%, #081a3a 55%, #000 100%); }

  /* Footer */
  .foot {
    position: fixed;
    bottom: 18px;
    left: 0; right: 0;
    text-align: center;
    z-index: 8;
    font-family: 'Cormorant Garamond', serif;
    font-size: 12px;
    color: var(--paper-dim);
    opacity: 0.5;
    letter-spacing: 3px;
    text-transform: uppercase;
  }
  .foot a { color: var(--paper-dim); text-decoration: none; margin: 0 12px; transition: opacity 0.3s, color 0.3s; }
  .foot a:hover { color: var(--candle); opacity: 1; }

  /* Entrance stagger */
  .stage, .title, .foot { opacity: 0; animation: fadeUp 1.6s cubic-bezier(0.25, 0.8, 0.25, 1) forwards; }
  .title { animation-delay: 0.5s; }
  .stage { animation-delay: 0.9s; }
  .foot  { animation-delay: 1.4s; }
  @keyframes fadeUp {
    from { opacity: 0; transform: translate(-50%, -48%); }
    to   { opacity: 1; transform: translate(-50%, -52%); }
  }
  .title, .foot { animation-name: fadeSimple; }
  @keyframes fadeSimple {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 720px) {
    .stage { height: 52vh; }
    .title { top: 4%; }
    .title h1 { letter-spacing: 1px; }
    .label .sub { max-width: 140px; font-size: 11px; }
  }
</style>
</head>

<!-- background layers -->
<div class="halo"></div>
<canvas id="flame"></canvas>
<canvas id="embers"></canvas>

<!-- title -->
<div class="title">
  <div class="kicker">Dylan Ewing</div>
  <div class="jp">二つの道</div>
  <h1>Choose <em>Your Path</em></h1>
</div>

<div class="stage" id="stage">
  <div class="hands-frame">
    <!-- 3 stacked stills: closed (default), left open, right open -->
    <img class="hands-media state-closed" id="imgClosed" src="img/matrix_closed.jpg"     alt="Both hands closed" loading="eager">
    <img class="hands-media state-left"   id="imgLeft"   src="img/matrix_leftopen.jpg"   alt="Left hand open red crystal" loading="eager">
    <img class="hands-media state-right"  id="imgRight"  src="img/matrix_rightopen.jpg"  alt="Right hand open blue crystal" loading="eager">

    <!-- Invisible split hotspots routing to different pages -->
    <a class="hot left" href="https://thedylanewing.com/detox">
      <div class="label">

        <div class="sub">Clean the body. Detox. The receipts.</div>
      </div>
    </a>
    <a class="hot right" href="https://thedylanewing.com/vault/">
      <div class="label">
        <div class="kanji">精神</div>
        <div class="name">Energy</div>
        <div class="sub">Wake the mind. The Vault.</div>
      </div>
    </a>
  </div>
</div>

<div class="foot">
  <a href="https://thedylanewing.com">thedylanewing.com</a>
  <a href="https://thedylanewing.com/links">all links</a>
</div>

<script type="module">
import * as THREE from 'three';

// ===================== 3D CANDLE SCENE =====================
// Real perspective scene: tapered wax candle + wick + billboarded GLSL flame
// + drifting smoke particles + warm point-light bathing the wax
(function(){
  const canvas = document.getElementById('flame');
  const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true, powerPreference:'high-performance' });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(35, window.innerWidth/window.innerHeight, 0.1, 100);
  camera.position.set(0, 0.3, 6);
  camera.lookAt(0, 0.6, 0);

  // Soft ambient
  scene.add(new THREE.AmbientLight(0x1a0e08, 0.35));

  // ---------- CANDLE BODY (tapered cylinder of wax) ----------
  const wax = new THREE.Mesh(
    new THREE.CylinderGeometry(0.20, 0.24, 1.4, 32, 1, false),
    new THREE.MeshPhysicalMaterial({
      color: 0xead0a0,
      roughness: 0.55,
      metalness: 0.0,
      transmission: 0.18,
      thickness: 0.6,
      ior: 1.45,
      sheen: 0.4,
      sheenColor: 0xffd9a0,
    })
  );
  wax.position.set(0, -0.4, 0);
  scene.add(wax);

  // soft melted lip on top of the candle (smaller, slightly drippy)
  const lip = new THREE.Mesh(
    new THREE.CylinderGeometry(0.18, 0.22, 0.06, 32),
    wax.material.clone()
  );
  lip.material.color.set(0xf2dcae);
  lip.position.set(0, 0.33, 0);
  scene.add(lip);

  // ---------- WICK (thin dark cylinder above the wax) ----------
  const wick = new THREE.Mesh(
    new THREE.CylinderGeometry(0.012, 0.018, 0.16, 8),
    new THREE.MeshStandardMaterial({ color: 0x1a0a05, roughness: 0.95 })
  );
  wick.position.set(0, 0.44, 0);
  scene.add(wick);

  // ---------- FLAME (billboarded plane with GLSL fire shader) ----------
  const flameVert = `
    varying vec2 vUv;
    void main(){
      vUv = uv;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }
  `;
  const flameFrag = `
    precision highp float;
    varying vec2 vUv;
    uniform float uTime;

    vec3 mod289(vec3 x){ return x - floor(x * (1.0/289.0)) * 289.0; }
    vec2 mod289(vec2 x){ return x - floor(x * (1.0/289.0)) * 289.0; }
    vec3 permute(vec3 x){ return mod289(((x*34.0)+1.0)*x); }
    float snoise(vec2 v){
      const vec4 C = vec4(0.211324865405187, 0.366025403784439, -0.577350269189626, 0.024390243902439);
      vec2 i = floor(v + dot(v, C.yy));
      vec2 x0 = v - i + dot(i, C.xx);
      vec2 i1 = (x0.x > x0.y) ? vec2(1.0, 0.0) : vec2(0.0, 1.0);
      vec4 x12 = x0.xyxy + C.xxzz; x12.xy -= i1;
      i = mod289(i);
      vec3 p = permute(permute(i.y + vec3(0.0, i1.y, 1.0)) + i.x + vec3(0.0, i1.x, 1.0));
      vec3 m = max(0.5 - vec3(dot(x0,x0), dot(x12.xy,x12.xy), dot(x12.zw,x12.zw)), 0.0);
      m = m*m; m = m*m;
      vec3 x = 2.0 * fract(p * C.www) - 1.0;
      vec3 h = abs(x) - 0.5;
      vec3 ox = floor(x + 0.5);
      vec3 a0 = x - ox;
      m *= 1.79284291400159 - 0.85373472095314 * (a0*a0 + h*h);
      vec3 g;
      g.x = a0.x * x0.x + h.x * x0.y;
      g.yz = a0.yz * x12.xz + h.yz * x12.yw;
      return 130.0 * dot(m, g);
    }
    float fbm(vec2 p){
      float v = 0.0, a = 0.5;
      for (int i = 0; i < 5; i++){ v += a * snoise(p); p *= 2.0; a *= 0.5; }
      return v;
    }

    void main(){
      // UV centered: x in [-1, 1], y in [0, 1] (0=base, 1=tip)
      vec2 p = vec2((vUv.x - 0.5) * 2.0, vUv.y);

      // base shape: tear drop, thicker at base
      float widthFalloff = mix(0.65, 0.20, p.y);     // narrows at top
      float baseShape = 1.0 - smoothstep(0.0, 1.0, abs(p.x) / widthFalloff);

      // turbulence — flicker increases with height
      vec2 np = vec2(p.x * 3.0, p.y * 4.0 - uTime * 2.8);
      float n  = fbm(np);
      float n2 = fbm(np * 2.0 + 7.3);
      float sway = n * 0.32 * smoothstep(0.0, 0.7, p.y);

      float distorted = 1.0 - smoothstep(0.0, 1.0, abs(p.x + sway) / widthFalloff);
      distorted *= smoothstep(-0.05, 0.15, p.y);          // fade in at base
      distorted *= smoothstep(1.05, 0.7, p.y + n2 * 0.18); // fade out at top

      float flame = pow(distorted, 1.15);

      // gradient — blue base, white core, yellow body, orange edge, red tip
      vec3 col;
      float h01 = clamp(p.y + n2 * 0.06, 0.0, 1.0);
      vec3 cBlue   = vec3(0.4, 0.7, 1.0);
      vec3 cWhite  = vec3(1.0, 0.95, 0.85);
      vec3 cYellow = vec3(1.0, 0.85, 0.4);
      vec3 cOrange = vec3(1.0, 0.5, 0.15);
      vec3 cRed    = vec3(0.85, 0.15, 0.06);

      if      (h01 < 0.07) col = mix(cBlue,   cWhite,  h01 / 0.07);
      else if (h01 < 0.28) col = mix(cWhite,  cYellow, (h01 - 0.07) / 0.21);
      else if (h01 < 0.58) col = mix(cYellow, cOrange, (h01 - 0.28) / 0.30);
      else                 col = mix(cOrange, cRed,    (h01 - 0.58) / 0.42);

      // gentle flicker
      float flick = 0.92 + 0.08 * sin(uTime * 9.0 + n2 * 7.0);
      float alpha = flame * flick;

      // bright halo around flame edges
      float halo = exp(-length(vec2(p.x * 1.2, (p.y - 0.4) * 0.9)) * 2.5) * 0.35 * flick;
      col += vec3(1.0, 0.6, 0.25) * halo;
      alpha = clamp(alpha + halo * 0.35, 0.0, 1.0);

      if (alpha < 0.005) discard;
      gl_FragColor = vec4(col, alpha);
    }
  `;
  const flameUniforms = { uTime: { value: 0 } };
  const flameMat = new THREE.ShaderMaterial({
    uniforms: flameUniforms,
    vertexShader: flameVert,
    fragmentShader: flameFrag,
    transparent: true,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
    side: THREE.DoubleSide,
  });
  const flameMesh = new THREE.Mesh(new THREE.PlaneGeometry(0.55, 0.85), flameMat);
  flameMesh.position.set(0, 0.92, 0);
  scene.add(flameMesh);

  // ---------- POINT LIGHT at flame ----------
  const flameLight = new THREE.PointLight(0xff9a4a, 4.0, 8, 1.4);
  flameLight.position.set(0, 0.92, 0.05);
  scene.add(flameLight);

  // ---------- SMOKE PARTICLES (small, drifting up from flame tip) ----------
  const smokeCount = 60;
  const smokeGeo = new THREE.BufferGeometry();
  const sPos  = new Float32Array(smokeCount * 3);
  const sVel  = new Float32Array(smokeCount * 3);
  const sLife = new Float32Array(smokeCount);
  function respawnSmoke(i){
    sPos[i*3]   = (Math.random() - 0.5) * 0.15;
    sPos[i*3+1] = 1.25 + Math.random() * 0.2;
    sPos[i*3+2] = (Math.random() - 0.5) * 0.1;
    sVel[i*3]   = (Math.random() - 0.5) * 0.0015;
    sVel[i*3+1] = 0.004 + Math.random() * 0.005;
    sVel[i*3+2] = (Math.random() - 0.5) * 0.001;
    sLife[i] = Math.random() * 2.0;
  }
  for (let i = 0; i < smokeCount; i++) respawnSmoke(i);
  smokeGeo.setAttribute('position', new THREE.BufferAttribute(sPos, 3));

  const smokeTex = (() => {
    const c = document.createElement('canvas'); c.width = c.height = 64;
    const ctx = c.getContext('2d');
    const g = ctx.createRadialGradient(32, 32, 0, 32, 32, 32);
    g.addColorStop(0,   'rgba(180, 170, 160, 0.45)');
    g.addColorStop(0.4, 'rgba(120, 110, 100, 0.18)');
    g.addColorStop(1,   'rgba(0, 0, 0, 0)');
    ctx.fillStyle = g; ctx.fillRect(0, 0, 64, 64);
    return new THREE.CanvasTexture(c);
  })();
  const smokeMat = new THREE.PointsMaterial({
    map: smokeTex,
    size: 0.35,
    transparent: true,
    blending: THREE.NormalBlending,
    depthWrite: false,
    sizeAttenuation: true,
    opacity: 0.25,
  });
  const smoke = new THREE.Points(smokeGeo, smokeMat);
  scene.add(smoke);

  function resize(){
    const w = window.innerWidth, h = window.innerHeight;
    renderer.setSize(w, h);
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
    // candle scales down on small screens
    const s = (w < 720) ? 0.7 : 1.0;
    wax.scale.setScalar(s);
    lip.scale.setScalar(s);
    wick.scale.setScalar(s);
    flameMesh.scale.setScalar(s);
    smoke.scale.setScalar(s);
  }
  window.addEventListener('resize', resize);
  resize();

  const start = performance.now();
  function animate(){
    const t = (performance.now() - start) * 0.001;
    flameUniforms.uTime.value = t;

    // Billboard the flame to face camera
    flameMesh.lookAt(camera.position);

    // Light intensity flickers with the flame
    flameLight.intensity = 3.6 + Math.sin(t * 9.0) * 0.4 + Math.sin(t * 17.0) * 0.2;

    // Animate smoke
    const p = smokeGeo.attributes.position.array;
    for (let i = 0; i < smokeCount; i++){
      p[i*3]   += sVel[i*3]   + Math.sin(t * 1.8 + i) * 0.0006;
      p[i*3+1] += sVel[i*3+1];
      p[i*3+2] += sVel[i*3+2];
      sLife[i] += 0.016;
      if (p[i*3+1] > 3.5 || sLife[i] > 6) respawnSmoke(i);
    }
    smokeGeo.attributes.position.needsUpdate = true;

    renderer.render(scene, camera);
    requestAnimationFrame(animate);
  }
  animate();
})();

// ===================== EMBERS (unchanged particles) =====================
(function(){
  const canvas = document.getElementById('embers');
  const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 100);
  camera.position.z = 5;
  function resize(){
    renderer.setSize(window.innerWidth, window.innerHeight);
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
  }
  window.addEventListener('resize', resize); resize();

  const count = 140;
  const geo = new THREE.BufferGeometry();
  const pos = new Float32Array(count * 3);
  const vel = new Float32Array(count * 3);
  const life = new Float32Array(count);
  function respawn(i){
    pos[i*3]   = (Math.random() - 0.5) * 1.2;
    pos[i*3+1] = -0.25 - Math.random() * 0.2;
    pos[i*3+2] = (Math.random() - 0.5) * 0.4;
    vel[i*3]   = (Math.random() - 0.5) * 0.004;
    vel[i*3+1] = 0.006 + Math.random() * 0.008;
    vel[i*3+2] = (Math.random() - 0.5) * 0.002;
    life[i] = Math.random() * 3.5;
  }
  for (let i = 0; i < count; i++) respawn(i);
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));

  const tex = (() => {
    const c = document.createElement('canvas'); c.width = c.height = 64;
    const ctx = c.getContext('2d');
    const g = ctx.createRadialGradient(32,32,0,32,32,32);
    g.addColorStop(0, 'rgba(255,230,180,1)');
    g.addColorStop(0.3, 'rgba(255,170,90,0.7)');
    g.addColorStop(0.7, 'rgba(200,90,40,0.2)');
    g.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = g; ctx.fillRect(0,0,64,64);
    return new THREE.CanvasTexture(c);
  })();
  const mat = new THREE.PointsMaterial({
    map: tex, color: 0xffc080, size: 0.08,
    transparent: true, blending: THREE.AdditiveBlending,
    depthWrite: false, sizeAttenuation: true, opacity: 0.85
  });
  const embers = new THREE.Points(geo, mat);
  scene.add(embers);

  let t = 0;
  function tick(){
    t += 0.016;
    const p = geo.attributes.position.array;
    for (let i = 0; i < count; i++){
      p[i*3]   += vel[i*3]   + Math.sin(t * 2 + i) * 0.0008;
      p[i*3+1] += vel[i*3+1];
      p[i*3+2] += vel[i*3+2];
      life[i] += 0.016;
      if (p[i*3+1] > 2.2 || life[i] > 5.5) respawn(i);
    }
    geo.attributes.position.needsUpdate = true;
    renderer.render(scene, camera);
    requestAnimationFrame(tick);
  }
  tick();
})();
</script>

<!-- ================ INTERACTION ================ -->
<script>
(function(){
  const stage  = document.getElementById('stage');
  const hots   = document.querySelectorAll('.hot');
  const tunnel = document.getElementById('tunnel');

  // Per-side hover: opens just that hand
  hots.forEach(h => {
    const side = h.classList.contains('left') ? 'hover-left' : 'hover-right';
    h.addEventListener('pointerenter', () => {
      stage.classList.remove('hover-left', 'hover-right');
      stage.classList.add(side);
    });
    h.addEventListener('pointerleave', () => {
      stage.classList.remove(side);
    });
  });

  // Parallax on mouse move
  let mx = 0, my = 0, tx = 0, ty = 0;
  window.addEventListener('pointermove', e => {
    mx = (e.clientX / window.innerWidth - 0.5) * 2;
    my = (e.clientY / window.innerHeight - 0.5) * 2;
  });
  function parallaxLoop(){
    tx += (mx - tx) * 0.05;
    ty += (my - ty) * 0.05;
    stage.style.setProperty('--px', `${-tx * 12}px`);
    stage.style.setProperty('--py', `${-ty * 6}px`);
    // Apply parallax only via translate so entrance/tunnel keep using transform
    // We piggyback by overriding translate on stage's transform — done via CSS var on a wrapper if needed.
    requestAnimationFrame(parallaxLoop);
  }
  parallaxLoop();

  // Click routing with tunnel zoom
  hots.forEach(h => {
    h.addEventListener('click', e => {
      e.preventDefault();
      const isLeft = h.classList.contains('left');
      const color = isLeft ? 'red' : 'blue';
      tunnel.classList.add('active', color);
      stage.classList.add(isLeft ? 'tunnel-red' : 'tunnel-blue');
      setTimeout(() => { window.location.href = h.href; }, 850);
    });
  });
})();
</script>
