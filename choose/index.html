<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Choose Your Path | Dylan Ewing</title>
<meta name="description" content="Two hands. Two paths. Material or Energy. Pick the pill.">
<meta property="og:title" content="Choose Your Path. Dylan Ewing">
<meta property="og:description" content="Two hands. Two paths. Material or Energy.">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;500;700&family=Cormorant+Garamond:ital,wght@0,300;0,500;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #a83328;
    --red-warm: #d9533f;
    --blue: #2d4a7a;
    --blue-warm: #4b7ec2;
    --candle: #ffb96a;
    --candle-core: #ffd9a0;
    --ink: #1a1512;
    --paper: #f2e6cc;
    --paper-dim: #c9bfa6;
    --bg: #08060a;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:100%; height:100%; }
  body {
    background: radial-gradient(ellipse at 50% 45%, #1a120a 0%, #0c0806 45%, #030203 100%);
    color: var(--paper);
    font-family: 'Cormorant Garamond', 'Noto Serif JP', serif;
    min-height: 100vh;
    overflow: hidden;
    position: relative;
  }

  /* ===== PAPER / WOOD GRAIN NOISE ===== */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.7' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.12'/%3E%3C/svg%3E");
    pointer-events: none;
    mix-blend-mode: overlay;
    opacity: 0.45;
    z-index: 1;
  }

  /* ===== CANDLELIGHT HALO ===== */
  .halo {
    position: fixed;
    top: 50%; left: 50%;
    width: 1200px; height: 1200px;
    transform: translate(-50%, -50%);
    background: radial-gradient(circle,
      rgba(255, 185, 106, 0.35) 0%,
      rgba(255, 185, 106, 0.15) 14%,
      rgba(168, 51, 40, 0.06) 30%,
      transparent 55%);
    animation: flicker 4.5s ease-in-out infinite alternate;
    pointer-events: none;
    z-index: 2;
    filter: blur(8px);
  }
  @keyframes flicker {
    0%, 100% { opacity: 0.85; transform: translate(-50%, -50%) scale(1); }
    20%      { opacity: 1.0;  transform: translate(-50%, -50.3%) scale(1.03); }
    40%      { opacity: 0.78; transform: translate(-50%, -49.7%) scale(0.98); }
    60%      { opacity: 0.92; transform: translate(-50.2%, -50%) scale(1.01); }
    80%      { opacity: 0.82; transform: translate(-49.8%, -50%) scale(0.99); }
  }

  /* ===== CANDLE FLAME (center) ===== */
  .candle {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    z-index: 3;
    pointer-events: none;
  }
  .flame {
    width: 28px; height: 44px;
    background: radial-gradient(ellipse at 50% 70%,
      var(--candle-core) 0%,
      var(--candle) 35%,
      rgba(255, 140, 60, 0.85) 60%,
      rgba(168, 51, 40, 0.4) 90%,
      transparent 100%);
    border-radius: 50% 50% 40% 40% / 60% 60% 40% 40%;
    filter: blur(1px);
    animation: flameDance 1.3s ease-in-out infinite alternate;
    box-shadow:
      0 0 24px rgba(255, 185, 106, 0.8),
      0 0 60px rgba(255, 140, 60, 0.5),
      0 0 120px rgba(168, 51, 40, 0.3);
  }
  @keyframes flameDance {
    0%   { transform: scale(1, 1) translateY(0); border-radius: 50% 50% 40% 40% / 60% 60% 40% 40%; }
    25%  { transform: scale(0.95, 1.08) translateX(-0.5px); }
    50%  { transform: scale(1.05, 0.95) translateX(0.5px); border-radius: 52% 48% 40% 40% / 65% 55% 40% 40%; }
    75%  { transform: scale(0.92, 1.1) translateX(0.3px); }
    100% { transform: scale(1.02, 0.98) translateX(-0.3px); }
  }
  .wick {
    width: 2px; height: 12px;
    background: #2a1810;
    margin: -6px auto 0;
    border-radius: 1px;
  }

  /* ===== TITLE ===== */
  .title {
    position: fixed;
    top: 12%;
    left: 0; right: 0;
    text-align: center;
    z-index: 5;
    pointer-events: none;
  }
  .title .jp {
    font-family: 'Noto Serif JP', serif;
    font-weight: 300;
    font-size: 22px;
    letter-spacing: 8px;
    color: var(--paper-dim);
    opacity: 0.7;
    margin-bottom: 8px;
  }
  .title h1 {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 300;
    font-size: clamp(40px, 7vw, 64px);
    color: var(--paper);
    letter-spacing: 2px;
    line-height: 1.1;
    text-shadow: 0 0 40px rgba(255, 185, 106, 0.25);
  }
  .title h1 em {
    font-style: italic;
    color: var(--candle);
    font-weight: 500;
  }
  .title p {
    font-family: 'Cormorant Garamond', serif;
    font-size: 16px;
    color: var(--paper-dim);
    margin-top: 16px;
    letter-spacing: 1px;
    opacity: 0.75;
  }

  /* ===== HANDS STAGE ===== */
  .stage {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 4;
  }
  .hands {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: clamp(40px, 12vw, 180px);
    width: 100%;
    max-width: 1100px;
    padding: 0 20px;
  }
  .hand-wrap {
    position: relative;
    cursor: pointer;
    text-decoration: none;
    color: inherit;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 18px;
    transition: transform 0.6s cubic-bezier(0.3, 0.7, 0.2, 1);
  }
  .hand-wrap:hover { transform: translateY(-6px); }

  .hand {
    width: clamp(220px, 32vw, 340px);
    height: clamp(290px, 42vw, 440px);
    position: relative;
    filter: drop-shadow(0 0 30px rgba(255, 185, 106, 0.15));
    transition: filter 0.6s ease;
  }

  /* Two stacked photo states, crossfade on hover */
  .hand .state {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 14px;
    transition: opacity 1.2s cubic-bezier(0.25, 0.8, 0.25, 1), transform 1.2s cubic-bezier(0.25, 0.8, 0.25, 1);
    mix-blend-mode: screen;
  }
  .hand .old    { opacity: 1; transform: scale(1); }
  .hand .young  { opacity: 0; transform: scale(0.96) rotate(-0.5deg); }

  .hand-wrap:hover .hand .old   { opacity: 0; transform: scale(1.04); }
  .hand-wrap:hover .hand .young { opacity: 1; transform: scale(1) rotate(0); }

  .hand-wrap:hover .hand {
    filter: drop-shadow(0 0 60px rgba(255, 185, 106, 0.45));
  }

  /* ===== LABELS ===== */
  .label {
    font-family: 'Cormorant Garamond', serif;
    text-align: center;
    transition: opacity 0.5s ease;
  }
  .label .kanji {
    font-family: 'Noto Serif JP', serif;
    font-size: 14px;
    letter-spacing: 6px;
    color: var(--paper-dim);
    opacity: 0.5;
    margin-bottom: 6px;
  }
  .label .name {
    font-size: clamp(26px, 4vw, 36px);
    font-style: italic;
    font-weight: 400;
    color: var(--paper);
    letter-spacing: 1px;
    margin-bottom: 4px;
  }
  .label .sub {
    font-size: 14px;
    color: var(--paper-dim);
    opacity: 0.7;
    letter-spacing: 0.5px;
    max-width: 220px;
    line-height: 1.4;
  }
  .left .name { color: var(--red-warm); }
  .right .name { color: var(--blue-warm); }

  /* ===== FOOTER ===== */
  .foot {
    position: fixed;
    bottom: 18px;
    left: 0; right: 0;
    text-align: center;
    z-index: 6;
    font-family: 'Cormorant Garamond', serif;
    font-size: 12px;
    color: var(--paper-dim);
    opacity: 0.5;
    letter-spacing: 3px;
    text-transform: uppercase;
  }
  .foot a { color: var(--paper-dim); text-decoration: none; margin: 0 12px; transition: opacity 0.3s; }
  .foot a:hover { color: var(--candle); opacity: 1; }

  /* ===== MOBILE ===== */
  @media (max-width: 720px) {
    .hands {
      flex-direction: column;
      gap: 32px;
      padding: 80px 20px 100px;
    }
    .stage {
      position: static;
      min-height: 100vh;
      overflow-y: auto;
    }
    .title {
      position: relative;
      top: 0;
      padding: 40px 20px 0;
    }
    .candle {
      position: relative;
      top: auto; left: auto; transform: none;
      margin: 20px auto;
    }
    body { overflow-y: auto; }
    html { overflow-y: auto; }
  }
</style>
</head>
<body>

<!-- candlelight halo -->
<div class="halo"></div>

<!-- candle flame (between the hands) -->
<div class="candle">
  <div class="flame"></div>
  <div class="wick"></div>
</div>

<!-- title -->
<div class="title">
  <div class="jp">二つの道</div>
  <h1>Choose <em>Your Path</em></h1>
  <p>Two hands. One breath. The other stays open when you come back.</p>
</div>

<!-- hands stage -->
<div class="stage">
  <div class="hands">

    <!-- LEFT HAND — RED CRYSTAL / MATERIAL / BODY -->
    <a class="hand-wrap left" href="https://thedylanewing.com/detox">
      <div class="hand">
        <img class="state old"   src="img/left_old.jpg"     alt="Closed weathered left hand" loading="eager">
        <img class="state young" src="img/left_crystal.jpg" alt="Open left hand holding red crystal" loading="eager">
      </div>

      <div class="label left">

    <!-- RIGHT HAND — BLUE CRYSTAL / ENERGY / MIND -->
    <a class="hand-wrap right" href="https://thedylanewing.com/vault/">
      <div class="hand">

        <img class="state young" src="img/right_crystal.jpg" alt="Open right hand holding blue crystal" loading="eager">
      </div>

      <div class="label right">
        <div class="kanji">精神</div>

      </div>

  </div>
</div>

<div class="foot">
  <a href="https://thedylanewing.com">thedylanewing.com</a>
  <a href="https://thedylanewing.com/links">all links</a>
</div>

</body>
</html>
