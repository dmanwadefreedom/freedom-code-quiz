<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Choose Your Path | Dylan Ewing</title>
<meta name="description" content="Two hands. Two paths. Material or Energy. Pick the pill.">
<meta property="og:title" content="Choose Your Path. Dylan Ewing">
<meta property="og:description" content="Two hands. Two paths. Material or Energy.">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;500;700&family=Cormorant+Garamond:ital,wght@0,300;0,500;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #a83328;
    --red-warm: #d9533f;
    --blue: #2d4a7a;
    --blue-warm: #4b7ec2;
    --candle: #ffb96a;
    --candle-core: #ffd9a0;
    --ink: #1a1512;
    --paper: #f2e6cc;
    --paper-dim: #c9bfa6;
    --bg: #08060a;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:100%; height:100%; }
  body {
    background: radial-gradient(ellipse at 50% 45%, #1a120a 0%, #0c0806 45%, #030203 100%);
    color: var(--paper);
    font-family: 'Cormorant Garamond', 'Noto Serif JP', serif;
    min-height: 100vh;
    overflow: hidden;
    position: relative;
  }

  /* ===== PAPER / WOOD GRAIN NOISE ===== */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.7' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.12'/%3E%3C/svg%3E");
    pointer-events: none;
    mix-blend-mode: overlay;
    opacity: 0.45;
    z-index: 1;
  }

  /* ===== EMBERS CANVAS (three.js particles) ===== */
  #embers {
    position: fixed;
    inset: 0;
    z-index: 3;
    pointer-events: none;
  }

  /* ===== CANDLELIGHT HALO ===== */
  /* Elongated ellipse centered on the candle (mid-height), so the top
     of the page (where the title sits) stays darker and readable */
  .halo {
    position: fixed;
    top: 55%; left: 50%;
    width: 1400px; height: 900px;
    transform: translate(-50%, -50%);
    background: radial-gradient(ellipse,
      rgba(255, 185, 106, 0.32) 0%,
      rgba(255, 185, 106, 0.14) 18%,
      rgba(168, 51, 40, 0.05) 34%,
      transparent 58%);
    animation: flicker 4.5s ease-in-out infinite alternate;
    pointer-events: none;
    z-index: 2;
    filter: blur(10px);
  }
  @keyframes flicker {
    0%, 100% { opacity: 0.85; transform: translate(-50%, -50%) scale(1); }
    20%      { opacity: 1.0;  transform: translate(-50%, -50.3%) scale(1.03); }
    40%      { opacity: 0.78; transform: translate(-50%, -49.7%) scale(0.98); }
    60%      { opacity: 0.92; transform: translate(-50.2%, -50%) scale(1.01); }
    80%      { opacity: 0.82; transform: translate(-49.8%, -50%) scale(0.99); }
  }

  /* ===== CANDLE FLAME (center) ===== */
  .candle {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    z-index: 3;
    pointer-events: none;
  }
  .flame {
    width: 28px; height: 44px;
    background: radial-gradient(ellipse at 50% 70%,
      var(--candle-core) 0%,
      var(--candle) 35%,
      rgba(255, 140, 60, 0.85) 60%,
      rgba(168, 51, 40, 0.4) 90%,
      transparent 100%);
    border-radius: 50% 50% 40% 40% / 60% 60% 40% 40%;
    filter: blur(1px);
    animation: flameDance 1.3s ease-in-out infinite alternate;
    box-shadow:
      0 0 24px rgba(255, 185, 106, 0.8),
      0 0 60px rgba(255, 140, 60, 0.5),
      0 0 120px rgba(168, 51, 40, 0.3);
  }
  @keyframes flameDance {
    0%   { transform: scale(1, 1) translateY(0); border-radius: 50% 50% 40% 40% / 60% 60% 40% 40%; }
    25%  { transform: scale(0.95, 1.08) translateX(-0.5px); }
    50%  { transform: scale(1.05, 0.95) translateX(0.5px); border-radius: 52% 48% 40% 40% / 65% 55% 40% 40%; }
    75%  { transform: scale(0.92, 1.1) translateX(0.3px); }
    100% { transform: scale(1.02, 0.98) translateX(-0.3px); }
  }
  .wick {
    width: 2px; height: 12px;
    background: #2a1810;
    margin: -6px auto 0;
    border-radius: 1px;
  }

  /* ===== TITLE ===== */
  .title {
    position: fixed;
    top: 9%;
    left: 0; right: 0;
    text-align: center;
    z-index: 7;
    pointer-events: none;
  }
  .title .jp {
    font-family: 'Noto Serif JP', serif;
    font-weight: 300;
    font-size: 22px;
    letter-spacing: 8px;
    color: var(--paper-dim);
    opacity: 0.75;
    margin-bottom: 8px;
    text-shadow: 0 2px 20px rgba(0, 0, 0, 0.9);
  }
  .title h1 {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 300;
    font-size: clamp(40px, 7vw, 64px);
    color: var(--paper);
    letter-spacing: 2px;
    line-height: 1.1;
    text-shadow:
      0 2px 20px rgba(0, 0, 0, 0.95),
      0 0 30px rgba(0, 0, 0, 0.6);
  }
  .title h1 em {
    font-style: italic;
    color: var(--candle);
    font-weight: 500;
  }
  .title p {
    font-family: 'Cormorant Garamond', serif;
    font-size: 16px;
    color: var(--paper-dim);
    margin-top: 16px;
    letter-spacing: 1px;
    opacity: 0.75;
  }

  /* ===== HANDS STAGE ===== */
  .stage {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 4;
  }
  .hands {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: clamp(40px, 12vw, 180px);
    width: 100%;
    max-width: 1100px;
    padding: 0 20px;
  }
  .hand-wrap {
    position: relative;
    cursor: pointer;
    text-decoration: none;
    color: inherit;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 18px;
    transition: transform 0.7s cubic-bezier(0.3, 0.7, 0.2, 1);
    will-change: transform;
  }
  .hand-wrap:hover { transform: translateY(-8px); }

  .hand {
    width: clamp(220px, 32vw, 340px);
    height: clamp(290px, 42vw, 440px);
    position: relative;
    filter: drop-shadow(0 0 30px rgba(255, 185, 106, 0.15));
    transition: filter 0.6s ease, transform 0.6s cubic-bezier(0.25, 0.8, 0.25, 1);
    transform-style: preserve-3d;
    animation: breathe 5s ease-in-out infinite;
  }
  @keyframes breathe {
    0%, 100% { transform: scale(1) translateY(0); }
    50%      { transform: scale(1.012) translateY(-2px); }
  }

  /* Poster = first frame still of the old hand. Video reveals on hover. */
  /* Radial mask fades the photo edges into the candlelit darkness so hands
     appear to float, no visible rectangle */
  .hand .poster,
  .hand .reveal {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: opacity 0.9s cubic-bezier(0.25, 0.8, 0.25, 1);
    mix-blend-mode: screen;
    pointer-events: none;
    -webkit-mask-image: radial-gradient(ellipse 68% 78% at 50% 48%,
                          #000 40%,
                          rgba(0,0,0,0.8) 62%,
                          rgba(0,0,0,0.3) 82%,
                          transparent 98%);
            mask-image: radial-gradient(ellipse 68% 78% at 50% 48%,
                          #000 40%,
                          rgba(0,0,0,0.8) 62%,
                          rgba(0,0,0,0.3) 82%,
                          transparent 98%);
    -webkit-mask-mode: alpha;
            mask-mode: alpha;
  }
  .hand .poster { opacity: 1; z-index: 2; }
  .hand .reveal { opacity: 0; z-index: 1; }

  .hand-wrap:hover .hand .poster { opacity: 0; }
  .hand-wrap:hover .hand .reveal { opacity: 1; animation: crystalPulse 2.8s ease-in-out infinite; }

  .hand-wrap:hover .hand {
    filter: drop-shadow(0 0 70px rgba(255, 185, 106, 0.5));
  }

  @keyframes crystalPulse {
    0%, 100% { filter: brightness(1)    saturate(1); }
    50%      { filter: brightness(1.18) saturate(1.3); }
  }

  /* Tunnel zoom on click */
  .hand-wrap.tunnel-red { animation: tunnelRed 0.9s cubic-bezier(0.6, 0, 0.9, 0.3) forwards; }
  .hand-wrap.tunnel-blue { animation: tunnelBlue 0.9s cubic-bezier(0.6, 0, 0.9, 0.3) forwards; }
  @keyframes tunnelRed {
    to { transform: scale(6); opacity: 0; filter: drop-shadow(0 0 200px rgba(255, 80, 60, 0.9)) blur(6px); }
  }
  @keyframes tunnelBlue {
    to { transform: scale(6); opacity: 0; filter: drop-shadow(0 0 200px rgba(60, 140, 255, 0.9)) blur(6px); }
  }

  /* Tunnel vignette on click */
  .tunnel-vignette {
    position: fixed; inset: 0; z-index: 100;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.9s ease;
  }
  .tunnel-vignette.active { opacity: 1; }
  .tunnel-vignette.red   { background: radial-gradient(circle at 30% 50%, transparent 0%, #3a0806 50%, #000 100%); }
  .tunnel-vignette.blue  { background: radial-gradient(circle at 70% 50%, transparent 0%, #081a3a 50%, #000 100%); }

  /* Entrance */
  .stage, .title, .candle, .foot { opacity: 0; animation: fadeUp 1.6s cubic-bezier(0.25, 0.8, 0.25, 1) forwards; }
  .candle { animation-delay: 0.2s; }
  .title { animation-delay: 0.6s; }
  .stage { animation-delay: 1.0s; }
  .foot  { animation-delay: 1.4s; }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .candle { transform-origin: center; }
  /* override fadeUp transform for candle (it's position:fixed w/ translate) */
  .candle { animation-name: fadeCandle; }
  @keyframes fadeCandle {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  /* ===== LABELS ===== */
  .label {
    font-family: 'Cormorant Garamond', serif;
    text-align: center;
    transition: opacity 0.5s ease;
  }
  .label .kanji {
    font-family: 'Noto Serif JP', serif;
    font-size: 14px;
    letter-spacing: 6px;
    color: var(--paper-dim);
    opacity: 0.5;
    margin-bottom: 6px;
  }
  .label .name {
    font-size: clamp(26px, 4vw, 36px);
    font-style: italic;
    font-weight: 400;
    color: var(--paper);
    letter-spacing: 1px;
    margin-bottom: 4px;
  }
  .label .sub {
    font-size: 14px;
    color: var(--paper-dim);
    opacity: 0.7;
    letter-spacing: 0.5px;
    max-width: 220px;
    line-height: 1.4;
  }
  .left .name { color: var(--red-warm); }
  .right .name { color: var(--blue-warm); }

  /* ===== FOOTER ===== */
  .foot {
    position: fixed;
    bottom: 18px;
    left: 0; right: 0;
    text-align: center;
    z-index: 6;
    font-family: 'Cormorant Garamond', serif;
    font-size: 12px;
    color: var(--paper-dim);
    opacity: 0.5;
    letter-spacing: 3px;
    text-transform: uppercase;
  }
  .foot a { color: var(--paper-dim); text-decoration: none; margin: 0 12px; transition: opacity 0.3s; }
  .foot a:hover { color: var(--candle); opacity: 1; }

  /* ===== MOBILE ===== */
  @media (max-width: 720px) {
    .hands {
      flex-direction: column;
      gap: 32px;
      padding: 80px 20px 100px;
    }
    .stage {
      position: static;
      min-height: 100vh;
      overflow-y: auto;
    }
    .title {
      position: relative;
      top: 0;
      padding: 40px 20px 0;
    }
    .candle {
      position: relative;
      top: auto; left: auto; transform: none;
      margin: 20px auto;
    }
    body { overflow-y: auto; }
    html { overflow-y: auto; }
  }
</style>
</head>
<body>

<!-- candlelight halo -->
<div class="halo"></div>

<!-- three.js ember particles -->

<!-- candle flame (between the hands) -->

<!-- title -->
<div class="title">

</div>

<!-- hands stage -->
<div class="stage">
  <div class="hands">

    <!-- LEFT HAND — RED CRYSTAL / MATERIAL / BODY -->
    <a class="hand-wrap left" href="https://thedylanewing.com/detox">

<!-- === EMBERS (three.js) === -->
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
  }
}
</script>
<script type="module">
import * as THREE from 'three';

const canvas = document.getElementById('embers');
const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true, powerPreference: 'high-performance' });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.z = 5;

function resize(){
  renderer.setSize(window.innerWidth, window.innerHeight);
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
}
window.addEventListener('resize', resize);
resize();

// Ember particles (floating dust rising from candle)
const emberCount = 140;
const geo = new THREE.BufferGeometry();
const positions = new Float32Array(emberCount * 3);
const velocities = new Float32Array(emberCount * 3);
const lifetimes = new Float32Array(emberCount);
const sizes = new Float32Array(emberCount);

function respawn(i){
  positions[i*3]   = (Math.random() - 0.5) * 1.4;   // x, near candle
  positions[i*3+1] = -0.4 - Math.random() * 0.3;    // y, starts at candle base
  positions[i*3+2] = (Math.random() - 0.5) * 0.6;   // z, slight depth
  velocities[i*3]   = (Math.random() - 0.5) * 0.004;
  velocities[i*3+1] = 0.006 + Math.random() * 0.008;  // rises
  velocities[i*3+2] = (Math.random() - 0.5) * 0.002;
  lifetimes[i] = Math.random() * 3.5;
  sizes[i] = 0.015 + Math.random() * 0.04;
}
for (let i = 0; i < emberCount; i++) respawn(i);

geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
geo.setAttribute('size', new THREE.BufferAttribute(sizes, 1));

const emberTexture = (() => {
  const c = document.createElement('canvas');
  c.width = c.height = 64;
  const ctx = c.getContext('2d');
  const g = ctx.createRadialGradient(32, 32, 0, 32, 32, 32);
  g.addColorStop(0,   'rgba(255, 230, 180, 1)');
  g.addColorStop(0.3, 'rgba(255, 170, 90, 0.7)');
  g.addColorStop(0.6, 'rgba(200, 90, 40, 0.25)');
  g.addColorStop(1,   'rgba(0,0,0,0)');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, 64, 64);
  return new THREE.CanvasTexture(c);
})();

const mat = new THREE.PointsMaterial({
  map: emberTexture,
  color: 0xffc080,
  size: 0.08,
  transparent: true,
  blending: THREE.AdditiveBlending,
  depthWrite: false,
  sizeAttenuation: true,
  opacity: 0.9
});
mat.onBeforeCompile = shader => {
  shader.vertexShader = shader.vertexShader.replace(
    'gl_PointSize = size;',
    'gl_PointSize = size * (300.0 / -mvPosition.z);'
  );
};

const embers = new THREE.Points(geo, mat);
scene.add(embers);

let t = 0;
function animate(){
  t += 0.016;
  const pos = geo.attributes.position.array;

  for (let i = 0; i < emberCount; i++){
    pos[i*3]   += velocities[i*3]   + Math.sin(t * 2 + i) * 0.0008;
    pos[i*3+1] += velocities[i*3+1];
    pos[i*3+2] += velocities[i*3+2];
    lifetimes[i] += 0.016;
    if (pos[i*3+1] > 2.2 || lifetimes[i] > 5.5) respawn(i);
  }
  geo.attributes.position.needsUpdate = true;

  renderer.render(scene, camera);
  requestAnimationFrame(animate);
}
animate();
</script>

<!-- === PARALLAX + TUNNEL-ZOOM CLICK === -->
<script>
(function(){
  const stage = document.querySelector('.stage');
  const hands = document.querySelectorAll('.hand-wrap');
  let mx = 0, my = 0, tx = 0, ty = 0;

  window.addEventListener('pointermove', e => {
    mx = (e.clientX / window.innerWidth - 0.5) * 2;
    my = (e.clientY / window.innerHeight - 0.5) * 2;
  });

  function loop(){
    tx += (mx - tx) * 0.06;
    ty += (my - ty) * 0.06;
    hands.forEach((h, i) => {
      const strength = 10;
      const sign = i === 0 ? 1 : -0.6; // left tilts opposite, right subtler
      h.style.setProperty('--parallax-x', `${-tx * strength * sign}px`);
      h.style.setProperty('--parallax-y', `${-ty * strength * 0.4}px`);
      h.style.translate = `var(--parallax-x, 0) var(--parallax-y, 0)`;
    });
    requestAnimationFrame(loop);
  }
  loop();

  // Play the DoP reveal video on hover, reset to start on leave
  hands.forEach(h => {
    const video = h.querySelector('video.reveal');
    if (!video) return;
    h.addEventListener('pointerenter', () => {
      try { video.currentTime = 0; video.play(); } catch(e) {}
    });
    h.addEventListener('pointerleave', () => {
      try { video.pause(); video.currentTime = 0; } catch(e) {}
    });
  });

  // Tunnel zoom on click
  const tunnel = document.getElementById('tunnel');
  hands.forEach(h => {
    h.addEventListener('click', (e) => {
      e.preventDefault();
      const isLeft = h.classList.contains('left');
      const color = isLeft ? 'red' : 'blue';
      tunnel.classList.add('active', color);
      h.classList.add(isLeft ? 'tunnel-red' : 'tunnel-blue');
      setTimeout(() => { window.location.href = h.href; }, 850);
    });
  });
})();
</script>
